<style>
:root { --bar-h: 48px; }

/* Breadcrumb pill neon */
.breadcrumbs{
  position: sticky;
  top: 0;
  z-index: 1000;
  display: inline-flex;
  align-items: center;
  gap: .4rem;

/* Anchor jump không bị che */
main h2, main h3 { scroll-margin-top: calc(var(--bar-h) + 12px); }

/* TOC collapsible */
.toc{
  border-left:3px solid #6f6;

.toc-head{

}
.toc-caret{ transition: transform .2s ease; }
.toc[aria-expanded="true"] .toc-caret,

.toc-body{

/* Back to Top floating */

<script>
/* Build TOC (H2/H3) + collapse/expand, nhớ trạng thái theo trang */
(function(){
  const toc = document.getElementById('toc');
  if(!toc) return;

  const content = document.querySelector('main') || document.body;
  const heads = [...content.querySelectorAll('h2, h3')];
  if(!heads.length){ toc.remove(); return; }

  // gán id nếu thiếu
  heads.forEach(h=>{
    if(!h.id) h.id = h.textContent.trim().toLowerCase()
      .replace(/[^\w\- ]+/g,'').replace(/\s+/g,'-');
  });

  // build list
  const ul = document.createElement('ul');
  heads.forEach(h=>{
    const li = document.createElement('li');
    li.setAttribute('data-level', h.tagName === 'H3' ? '3' : '2');
    const a = document.createElement('a');
    a.href = '#'+h.id;
    a.textContent = h.textContent;
    li.appendChild(a);
    ul.appendChild(li);
  });
  toc.querySelector('.toc-body').appendChild(ul);

  // trạng thái mở/đóng
  const key = 'toc-state:'+location.pathname;
  const preferOpen = window.matchMedia('(min-width: 900px)').matches; // desktop mặc định mở
  const saved = localStorage.getItem(key);
  const startOpen = saved ? saved === 'open' : preferOpen;
  setExpanded(startOpen);

  toc.querySelector('.toc-head').addEventListener('click', ()=>{
    const open = toc.classList.contains('collapsed');
    setExpanded(open);
    localStorage.setItem(key, open ? 'open' : 'closed');
  });

  // click link TOC -> auto đóng trên mobile
  toc.addEventListener('click', e=>{
    const a = e.target.closest('a');
    if(!a) return;
    if(!window.matchMedia('(min-width: 900px)').matches){
      setExpanded(false);
      localStorage.setItem(key, 'closed');
    }
  });

  function setExpanded(open){
    toc.classList.toggle('collapsed', !open);
    toc.setAttribute('aria-expanded', String(open));
    toc.querySelector('.toc-head').setAttribute('aria-expanded', String(open));
  }
})();

/* Back to Top: hiện/ẩn + cuộn mượt */
(function(){
  const btn = document.getElementById('backTop');
  if(!btn) return;

  const toggle = () => {
    btn.style.display = window.scrollY > 200 ? 'block' : 'none';
  };
  window.addEventListener('scroll', toggle, {passive:true});
  toggle();

  btn.addEventListener('click', ()=>{
    window.scrollTo({top:0, behavior:'smooth'});
  });
})();
</script>
